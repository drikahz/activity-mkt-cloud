<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://unpkg.com/postmonger"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:30px;
      font-family: Arial, sans-serif;
      background:#f4f6f9;
      color:#333;
    }

    .container{
      background:#fff;
      border-radius:16px;
      padding:30px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
      max-width:600px;
      margin:0 auto;
    }

    h3{
      margin-top:0;
      margin-bottom:25px;
      font-size:24px;
      color:#222;
    }

    .field{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:bold;
      color:#555;
    }

    select{
      width:100%;
      padding:14px;
      border:1px solid #dcdfe4;
      border-radius:10px;
      font-size:15px;
      background:#fff;
      transition:0.2s;
      appearance:none;
    }

    select:focus{
      outline:none;
      border-color:#0070d2;
      box-shadow:0 0 0 3px rgba(0,112,210,0.15);
    }

    .info{
      margin-top:25px;
      padding:16px;
      background:#f7f9fc;
      border-radius:10px;
      border-left:4px solid #0070d2;
      font-size:14px;
      line-height:1.5;
      color:#555;
    }

    .tag{
      display:inline-block;
      margin-top:10px;
      padding:6px 12px;
      background:#e8f3ff;
      color:#0070d2;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h3>Configuração do WhatsApp</h3>

  <div class="field">
    <label>Template da mensagem</label>

    <select id="mensagem">
      <option value="carrinho_abandonado" selected>
        Carrinho Abandonado
      </option>
    </select>
  </div>

  <div class="info">
    Esta activity envia automaticamente os dados do contato
    para integração com backend externo e disparo via WhatsApp.

    <div class="tag">
      Integração ativa
    </div>
  </div>

</div>

<script>

  const connection = new Postmonger.Session();
  let activity = {};

  // 🔹 Carrega dados ao abrir a activity
  connection.on('initActivity', function(data) {

    activity = data || {};

    const inArgs =
      activity?.arguments?.execute?.inArguments || [];

    const mensagem =
      inArgs[0]?.mensagem || "Carrinho Abandonado";

    document.getElementById("mensagem").value =
      mensagem;
  });

  // 🔹 Handshake necessário
  connection.on('requestedTokens', function(tokens) {});
  connection.on('requestedEndpoints', function(endpoints) {});

  connection.trigger('ready');
  connection.trigger('requestTokens');
  connection.trigger('requestEndpoints');

  // 🔹 Habilita botão "Concluído"
  connection.trigger('updateButton', {
    button: 'next',
    text: 'Concluído',
    visible: true,
    enabled: true
  });

  // 🔹 Quando clicar em concluído
  connection.on('clickedNext', function() {
    salvar();
  });

  // 🔹 Salvar configuração
  function salvar() {

    const mensagem =
      document.getElementById("mensagem").value;

    // Garante estrutura
    activity.arguments =
      activity.arguments || {};

    activity.arguments.execute =
      activity.arguments.execute || {};

    // Dados enviados ao webhook/backend
    activity.arguments.execute.inArguments = [
      {
        "template": mensagem,
        "celular": "{{Event.DEAudience-1.celular}}",
        "email": "{{Event.DEAudience-1.email}}"
      }
    ];

    activity.metaData =
      activity.metaData || {};

    activity.metaData.isConfigured = true;

    // Atualiza activity
    connection.trigger(
      'updateActivity',
      activity
    );

    // Fecha modal
    connection.trigger('nextStep');
  }

</script>

</body>
</html>
